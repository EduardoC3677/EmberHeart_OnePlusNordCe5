    - name: Add optimize patches to common kernel (Nord CE5 / mt6897)
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Applying optimize patches from this repo..."
        # Parches de optimizacion (originalmente op11/common de nullptr-t-oss)
        # portados/verificados contra el GKI android14-6.1 del Nord CE5 y
        # versionados en este repo (patches/optimize/). Se aplican sobre el GKI
        # common de forma tolerante: si alguno no encaja por diferencias de
        # arbol se omite con warning en vez de abortar el build.
        cd "$CONFIG/kernel_platform/common"
        OPT_DIR="$GITHUB_WORKSPACE/patches/optimize"
        if [ ! -d "$OPT_DIR" ]; then
          echo "::warning::no patches/optimize dir, skipping"; echo "::endgroup::"; exit 0
        fi

        apply_opt() {
          local f="$OPT_DIR/$1"
          [ -f "$f" ] || { echo "::warning::optimize patch ausente: $1"; return 0; }
          # idempotente: si ya esta aplicado (reverse limpio), saltar.
          if patch -p1 -R --dry-run --force --fuzz=3 <"$f" >/dev/null 2>&1; then
            echo "   $1: ya aplicado, skip"; return 0
          fi
          if patch -p1 --forward --fuzz=3 <"$f"; then
            echo "   $1: OK"
          else
            echo "::warning::skip $1 (no aplico limpio)"
          fi
        }

        # 8 parches op11/common verificados sin cambios + xiaomi_zram adaptado
        # a la forma nueva de bio_alloc() del GKI 6.1 del Nord CE5.
        apply_opt clear_page_16bytes_align.patch
        apply_opt file_struct_8bytes_align.patch
        apply_opt lz4_armv8_acceleration.patch
        apply_opt lz4_optimized_decompress.patch
        apply_opt optimized_mem_operations.patch
        apply_opt reduce_cache_pressure.patch
        apply_opt reduce_pelt.patch
        apply_opt workqueue.patch
        apply_opt xiaomi_zram_optimization.patch

        echo "Optimize patches applied ❤️‍🔥"
        echo "::endgroup::"

    - name: Apply hybridswap/zram fix patches (Nord CE5 / mt6897)
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Applying Nord CE5 zram/hybridswap fix patches..."
        # Parches portados del workflow EmberHeart_OnePlusNordCe5 (cadena de 6
        # parches que arregla hybrid_swap/zram en mt6897/OOS16). 0001-0005 tocan
        # el GKI common; 0006 toca el vendor tree (hybridswap_zram). Se aplican
        # con --forward para ser idempotentes y con fuzz para tolerar offsets.
        KP="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        PATCHES_DIR="$GITHUB_WORKSPACE/patches"

        apply_in() {
          # $1 = dir base (common o kernel_platform), resto = patches
          local base="$1"; shift
          cd "$base"
          for p in "$@"; do
            local f="$PATCHES_DIR/$p"
            [ -f "$f" ] || { echo "::warning::patch ausente: $p"; continue; }
            echo ">> $p  (en $base)"
            if patch -p1 --forward --fuzz=3 < "$f"; then
              echo "   OK"
            else
              # --forward devuelve !=0 si ya estaba aplicado: lo toleramos
              echo "::warning::patch $p no aplico limpio (¿ya aplicado?), continuo"
            fi
          done
        }

        # 0001-0005 -> common (GKI)
        apply_in "$KP/common" \
          0001-fix-hybrid_swap-zram-oneplus.patch \
          0002-module-load-vendor-ko-ignore-modversion.patch \
          0003-kmi-export-android_vh_throttle_direct_reclaim_bypass.patch \
          0004-kmi-sched_assist-deps-zram-chain.patch \
          0005-mm-memcontrol-replay-hybridswap-memcg-alloc.patch

        # 0006 -> kernel_platform (ruta vendor/oplus/kernel/mm/hybridswap_zram/...)
        apply_in "$KP" \
          0006-mm-hybridswap-resize-nr_objs-to-live-disksize.patch

        echo "Nord CE5 zram/hybridswap patches applied 🔥"
        echo "::endgroup::"

    - name: Add other kernel patches to common kernel
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Applying patches from wild kernels..."
        cd "$CONFIG/kernel_platform/common"

        # Parches genericos de optimizacion (WildKernels) para GKI common.
        # En el original estaban limitados a SOC=kalama (OP11). Para el Nord CE5
        # (mt6897, mismo GKI android14-6.1) se aplican igual, de forma tolerante
        # e idempotente: si un parche ya esta aplicado o no encaja por diferencias
        # de arbol, se omite con warning en vez de abortar el build.
        ap()  {
          local f="$1"
          [ -f "$f" ] || { echo "::warning::ausente $(basename "$f")"; return 0; }
          if patch -p1 -R --dry-run --force --fuzz=3 <"$f" >/dev/null 2>&1; then
            echo "skip (ya aplicado) $(basename "$f")"; return 0
          fi
          patch -p1 --forward --fuzz=3 < "$f" || echo "::warning::skip $(basename "$f")"
        }
        apf() { ap "$1"; }   # mismo comportamiento tolerante (fuzz incluido)

        ap  "../../../kernel_patches/common/mem_opt_prefetch.patch"

        # optimise_memcmp: en OP11/kalama el arbol usaba SYM_FUNC_START_WEAK_PI y
        # requeria un sed para reescribir los simbolos. El GKI 6.1 del Nord CE5
        # YA usa el esquema moderno (SYM_FUNC_START(__pi_memcmp) +
        # SYM_FUNC_ALIAS_WEAK(memcmp, __pi_memcmp) + EXPORT_SYMBOL_NOKASAN), que
        # es exactamente el que produce el parche upstream. Por eso aqui se aplica
        # DIRECTO, sin el sed (que en mt6897 corrompe el contexto y hace fallar
        # el hunk del cuerpo de la funcion).
        ap  "../../../kernel_patches/common/optimise_memcmp.patch"

        ap  "../../../kernel_patches/common/minimise_wakeup_time.patch"
        ap  "../../../kernel_patches/common/int_sqrt.patch"
        ap  "../../../kernel_patches/common/force_tcp_nodelay.patch"
        ap  "../../../kernel_patches/common/reduce_gc_thread_sleep_time.patch"
        ap  "../../../kernel_patches/common/add_timeout_wakelocks_globally.patch"
        ap  "../../../kernel_patches/common/f2fs_reduce_congestion.patch"
        ap  "../../../kernel_patches/common/reduce_freeze_timeout.patch"

        # Cadena cpufreq scaling_min_freq: el orden importa (add_limitation crea
        # store_cpumask_min_limit, re_write lo reescribe, use_unlikely lo envuelve).
        apf "../../../kernel_patches/common/add_limitation_scaling_min_freq.patch"
        apf "../../../kernel_patches/common/re_write_limitation_scaling_min_freq.patch"
        apf "../../../kernel_patches/common/adjust_cpu_scan_order.patch"
        apf "../../../kernel_patches/common/avoid_extra_s2idle_wake_attempts.patch"
        apf "../../../kernel_patches/common/disable_cache_hot_buddy.patch"
        apf "../../../kernel_patches/common/f2fs_enlarge_min_fsync_blocks.patch"
        apf "../../../kernel_patches/common/increase_ext4_default_commit_age.patch"
        apf "../../../kernel_patches/common/increase_sk_mem_packets.patch"
        apf "../../../kernel_patches/common/reduce_pci_pme_wakeups.patch"
        apf "../../../kernel_patches/common/silence_irq_cpu_logspam.patch"
        apf "../../../kernel_patches/common/silence_system_logspam.patch"
        apf "../../../kernel_patches/common/use_unlikely_wrap_cpufreq.patch"

        echo "Other kernel patches applied 🔥"
        echo "::endgroup::"

