    - name: Detect Clang (toolchain for build)
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Detecting Clang..."
        KP="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        CLANG_FOUND=false
        for base in "$KP/prebuilts" "$KP/prebuilts-master"; do
          [ -d "$base/clang/host/linux-x86" ] || continue
          latest=$(ls -d "$base"/clang/host/linux-x86/clang-r*/ 2>/dev/null | sort -V | tail -n1 || true)
          if [ -n "$latest" ] && [ -x "$latest/bin/clang" ]; then
            CLANG_BIN="$latest/bin"
            CLANG_FOUND=true
          fi
        done
        if ! $CLANG_FOUND && command -v clang >/dev/null 2>&1; then
          # Solo aceptamos el clang del sistema si ademas trae la suite LLVM
          # completa (llvm-ar). En los runners de GitHub, 'clang' existe pero
          # 'llvm-ar' suele faltar (viene versionado o en paquete aparte), lo
          # que rompe el build con LLVM=1. Si falta, caemos al prebuilt AOSP.
          SYS_CLANG_BIN="$(dirname "$(command -v clang)")"
          if command -v llvm-ar >/dev/null 2>&1 || [ -x "$SYS_CLANG_BIN/llvm-ar" ]; then
            CLANG_BIN="$SYS_CLANG_BIN"
            CLANG_FOUND=true
            echo "Using system clang (llvm-ar present)."
          else
            echo "System clang found but llvm-ar missing; will fetch AOSP prebuilt."
          fi
        fi
        $CLANG_FOUND || {
          # ----------------------------------------------------------------
          # El arbol mt6897 de OnePlus NO incluye prebuilts/clang (a diferencia
          # de los manifest QCOM). El clang del sistema (apt) trae 'clang' pero
          # NO la suite LLVM con nombres sin sufijo (llvm-ar/llvm-nm/...), por lo
          # que el build con LLVM=1 AR=llvm-ar falla con "llvm-ar: not found"
          # (Error 127 en tools/bpf/resolve_btfids -> libbpf.a).
          # Solucion: descargar el prebuilt Clang oficial de AOSP que el propio
          # arbol declara en build.config.constants (CLANG_VERSION=rXXXXXXX).
          # Ese tarball incluye clang, ld.lld y toda la suite llvm-* sin sufijo.
          # ----------------------------------------------------------------
          echo "No prebuilt clang in tree; fetching AOSP prebuilt..."
          CV=""
          for cf in "$KP/common/build.config.constants" "$KP/common/build.config.common"; do
            [ -f "$cf" ] || continue
            v=$(grep -oE '^CLANG_VERSION=[A-Za-z0-9]+' "$cf" | head -n1 | cut -d= -f2 || true)
            if [ -n "$v" ]; then CV="$v"; break; fi
          done
          [ -n "$CV" ] || CV="r487747c"   # fallback conocido para android14-6.1
          echo "Target AOSP Clang version: clang-$CV"
          CLANG_DIR="$KP/prebuilts/clang/host/linux-x86/clang-$CV"
          mkdir -p "$CLANG_DIR"
          DL_OK=false
          for BR in android14-release main android15-release; do
            URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/$BR/clang-$CV.tar.gz"
            echo "Trying $BR ..."
            if curl -fsSL --retry 3 --retry-delay 10 --max-time 600 "$URL" -o /tmp/clang.tar.gz; then
              if tar xzf /tmp/clang.tar.gz -C "$CLANG_DIR" 2>/dev/null && [ -x "$CLANG_DIR/bin/clang" ]; then
                DL_OK=true; rm -f /tmp/clang.tar.gz; break
              fi
            fi
            echo "  branch $BR failed; trying next"; rm -f /tmp/clang.tar.gz
          done
          $DL_OK || { echo "Failed to fetch AOSP prebuilt clang-$CV"; exit 1; }
          # Verificar que la suite LLVM esta completa (clave: llvm-ar).
          for t in clang ld.lld llvm-ar llvm-nm llvm-objcopy llvm-strip; do
            [ -x "$CLANG_DIR/bin/$t" ] || { echo "prebuilt missing $t"; exit 1; }
          done
          CLANG_BIN="$CLANG_DIR/bin"
          CLANG_FOUND=true
          echo "AOSP prebuilt clang ready at $CLANG_BIN"
        }
        echo "CLANG_BIN_PATH=$CLANG_BIN" >> "$GITHUB_ENV"
        CLANG_VERSION="$("$CLANG_BIN/clang" --version | head -n1)"
        echo "CLANG_VERSION=$CLANG_VERSION" >> "$GITHUB_ENV"
        echo "Detected Clang: $CLANG_VERSION"

        echo "Clang detected ✅"
        echo "::endgroup::"

    - name: Build Kernel
      shell: bash
      env:
        PYTHONWARNINGS: "ignore:invalid escape sequence"
      run: |
        set -euo pipefail
        echo "::group::Build kernel"
        KERNEL_PLATFORM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        COMMON="$KERNEL_PLATFORM/common"
        cd "$COMMON"
        : > "$COMMON/.scmversion"

        # Ensure Python warnings are suppressed for scripts invoked by make
        export PYTHONWARNINGS="${PYTHONWARNINGS}"

        if [ -n "${CLANG_BIN_PATH:-}" ] && [ -x "${CLANG_BIN_PATH}/clang" ]; then
          export PATH="${CLANG_BIN_PATH}:$PATH"
        fi

        export PATH="/usr/lib/ccache:$PATH"

        MAKE_FLAGS+=(
          LLVM=1
          LLVM_IAS=1
          ARCH=arm64
          SUBARCH=arm64
          LD=ld.lld
          HOSTLD=ld.lld
          AR=llvm-ar
          NM=llvm-nm
          OBJCOPY=llvm-objcopy
          OBJDUMP=llvm-objdump
          DEPMOD=depmod
          DTC=dtc
          STRIP=llvm-strip
          HOSTCC=clang
          HOSTCXX=clang++
          CC="ccache clang"
        )

        OUT=out
        INSTALL_MOD_PATH="$COMMON/out"
        mkdir -p "$OUT"
        make "${MAKE_FLAGS[@]}" O="$OUT" gki_defconfig

        if [ "${{ inputs.optimize_level }}" = "O3" ]; then
          KCFLAGS_EXTRA="-O3"
        else
          KCFLAGS_EXTRA="-O2"
        fi

        # LOCALVERSION branding
        if [ -n "${CUSTOM_LOCALVERSION:-}" ]; then
          ./scripts/config --file "$OUT/.config" \
            --set-str LOCALVERSION "${CUSTOM_LOCALVERSION}" \
            --disable LOCALVERSION_AUTO
          sed -i 's/scm_version="$(scm_version --short)"/scm_version=""/' scripts/setlocalversion
        fi

        # Consistent flags; include -pipe and disable stack protector
        KCFLAGS="-Wno-error -pipe -fno-stack-protector ${KCFLAGS_EXTRA}"
        KCPPFLAGS="-DCONFIG_OPTIMIZE_INLINING"

        echo "Starting build with $(nproc --all) threads..."
        make "${MAKE_FLAGS[@]}" O="$OUT" olddefconfig
        make -j$(nproc --all) "${MAKE_FLAGS[@]}" KCFLAGS="$KCFLAGS" KCPPFLAGS="$KCPPFLAGS" O="$OUT" Image modules
        make -j$(nproc --all) "${MAKE_FLAGS[@]}" O="$OUT" INSTALL_MOD_PATH="$INSTALL_MOD_PATH" modules_install

        IMG="$OUT/arch/arm64/boot/Image"
        if [ ! -f "$IMG" ]; then
          echo "Kernel Image missing"
          exit 1
        fi
        sha256sum "$IMG" | tee "$OUT/Image.sha256"
        echo "Kernel built 😆"
        echo "::endgroup::"

    - name: Collect Build Stats / Validate Image
      id: collect_stats
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Collecting Build Stats..."
        KERNEL_PLATFORM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        COMMON="$KERNEL_PLATFORM/common"
        OUT="$COMMON/out"
        IMG="$OUT/arch/arm64/boot/Image"

        WARNINGS=$(grep -i -E 'warning:' "$COMMON/build.log" | wc -l || true)
        echo "$WARNINGS" > "$OUT/warnings.txt"

        if [ -f "$IMG" ]; then
          file "$IMG" > "$OUT/Image.file" || true
          KERNEL_UNAME=$(strings "$IMG" | grep -E 'Linux version.*#' | tail -n1 || true)
          echo "Kernel Uname: ${KERNEL_UNAME:-unknown}"
          echo "KERNEL_UNAME=${KERNEL_UNAME:-unknown}" >> "$GITHUB_ENV"

          if ! file "$IMG" | grep -qi 'ARM64'; then
            echo "WARNING: Image does not appear to be ARM64:"
            file "$IMG" || true
          fi

          MIN_SIZE=$((6*1024*1024))
          ACTUAL_SIZE=$(stat -c %s "$IMG" || echo 0)
          if [ "$ACTUAL_SIZE" -lt "$MIN_SIZE" ]; then
            echo "WARNING: Image size $ACTUAL_SIZE < $MIN_SIZE (suspicious)."
          fi

          CALC_SHA=$(sha256sum "$IMG" | cut -d' ' -f1)
          if [ -f "$OUT/Image.sha256" ]; then
            REC_SHA=$(cut -d' ' -f1 "$OUT/Image.sha256" | tr -d '\n')
            if [ "$CALC_SHA" != "$REC_SHA" ]; then
              echo "WARNING: Image.sha256 mismatch. recorded=$REC_SHA calculated=$CALC_SHA"
            fi
            IMAGE_SHA256="$REC_SHA"
          else
            echo "WARNING: Image.sha256 not found, using calculated sha256."
            IMAGE_SHA256="$CALC_SHA"
          fi
        else
          echo "WARNING: Image file not found at $IMG"
          IMAGE_SHA256=""
          KERNEL_UNAME="unknown"
          echo "KERNEL_UNAME=unknown" >> "$GITHUB_ENV"
        fi

        echo "Image sha256: ${IMAGE_SHA256:-none}"
        echo "warnings=$WARNINGS" >> "$GITHUB_OUTPUT"
        echo "image_sha256=${IMAGE_SHA256:-}" >> "$GITHUB_OUTPUT"

        echo "Build stats collected ✅"
        echo "::endgroup::"

    - name: Create Kernel ZIP
      id: create_zip
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Creating AK3 zip..."
        CONFIG_DIR="$GITHUB_WORKSPACE/$CONFIG"
        IMAGE_PATH="$CONFIG_DIR/kernel_platform/common/out/arch/arm64/boot/Image"
        if [ ! -f "$IMAGE_PATH" ]; then
          echo "ERROR: Built Image not found"
          exit 1
        fi

        # Put Image into AnyKernel3
        cp "$IMAGE_PATH" "$GITHUB_WORKSPACE/AnyKernel3/Image"
        cd "$GITHUB_WORKSPACE/AnyKernel3"

        sed -i '7 c\kernel.string=EmberHeart Kernel by nullptr-t-oss' anykernel.sh
        curl https://raw.githubusercontent.com/nullptr-t-oss/kernel_patches/refs/heads/main/banner > banner

        ZIP_NAME="AnyKernel3_${MODEL}_${{ env.KERNEL_FULL_VER }}_Next_${KSUVER}_SuSFS_${SUSVER}.zip"
        ARTIFACTS_DIR="$CONFIG_DIR/artifacts"
        mkdir -p "$ARTIFACTS_DIR"

        echo "Creating flashable zip: $ZIP_NAME"
        ( cd "$GITHUB_WORKSPACE/AnyKernel3" && zip -r "$ARTIFACTS_DIR/$ZIP_NAME" ./* >/dev/null )

        # Keep only the flashable zip and the model metadata file (assumed already created earlier)
        find "$ARTIFACTS_DIR" -maxdepth 1 -type f ! -name "$ZIP_NAME" ! -name "${MODEL}.txt" -delete

        # Output for later steps (optional)
        echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"

        echo "AnyKernel3 zip created ✅"
        echo "::endgroup::"

    - name: Create Boot Image
      if: success() && steps.create_zip.conclusion == 'success'
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Creating boot image..."
        CONFIG_DIR="$GITHUB_WORKSPACE/$CONFIG"
        IMAGE="$CONFIG_DIR/kernel_platform/common/out/arch/arm64/boot/Image"

        cd "$GITHUB_WORKSPACE"
        mkdir -p boot
        # Download stock boot image
        wget https://github.com/${GITHUB_REPOSITORY}/raw/refs/heads/main/tools/boot.zip
        unzip boot.zip
        # Download magiskboot binary
        wget https://github.com/magojohnji/magiskboot-linux/raw/refs/heads/main/x86_64/magiskboot

        BOOT=$(ls | grep -E '*.img')
        MAGISKBOOT="./magiskboot"

        chmod +x $MAGISKBOOT

        echo -n "Unpacking boot image..."
        $MAGISKBOOT unpack $BOOT
        echo -n "Adding kernel to boot image..."
        mv -f $IMAGE kernel
        echo -n "Repacking boot image..."
        $MAGISKBOOT repack $BOOT

        mv -f new-boot.img EmberHeart_boot.img
        cp EmberHeart_boot.img "$CONFIG_DIR/artifacts/"

        echo "Boot image created ✅"
        echo "::endgroup::"

    - name: Final Build Summary
      shell: bash
      run: |
        set -euo pipefail
        {
          echo "Model: ${MODEL}"
          echo "Android: ${{ env.ANDROID_VER }}"
          echo "Kernel base: ${{ env.KERNEL_VER }}"
          echo "Kernel full: ${{ env.KERNEL_FULL_VER }}"
          echo "Kernel Uname: ${{ env.KERNEL_UNAME }}"
          echo "KSUN Version: ${KSUVER:-unknown}"
          echo "KSUN commit SHA: ${{ env.KSUN_COMMIT_SHA }}"
          echo "SUSFS Version: ${SUSVER:-unknown}"
          echo "SUSFS commit SHA: ${{ env.SUSFS_COMMIT_SHA }}"
          echo "Optimization: ${{ inputs.optimize_level }}"
          echo "Image SHA256: ${{ steps.collect_stats.outputs.image_sha256 }}"
          echo "Compiler: ${CLANG_VERSION:-unknown}"
          echo ""
          echo "CCache Statistics :"
          echo "$(ccache -s -v)"
        } | tee summary.txt
        {
          echo "### Kernel Build Summary"
          echo ""
          echo "- Model: ${{ env.MODEL }}"
          echo "- Android: ${{ env.ANDROID_VER }}"
          echo "- Kernel Version: ${{ steps.save_metadata.outputs.kernel_version }}"
          echo "- Kernel Uname: ${{ env.KERNEL_UNAME }}"
          echo "- KSUN Version: ${KSUVER:-unknown}"
          echo "- KSUN commit SHA: [${{ env.KSUN_COMMIT_SHA }}](https://github.com/KernelSU-Next/KernelSU-Next/commit/${{ env.KSUN_COMMIT_SHA }})"
          echo "- SUSFS Version: ${SUSVER:-unknown}"
          echo "- SUSFS commit SHA: [${{ env.SUSFS_COMMIT_SHA }}](https://gitlab.com/simonpunk/susfs4ksu/-/commit/${{ env.SUSFS_COMMIT_SHA }})"
          echo "- Optimization: ${{ inputs.optimize_level }}"
          echo "- Image SHA256: ${{ steps.collect_stats.outputs.image_sha256 }}"
          echo ""
          echo "CCache Statistics :"
          echo "$(/usr/bin/ccache -s)"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Cleanup old ccache
      shell: bash
      run: |
        set -euo pipefail
        echo "Deleting old ccache..."
        gh cache delete ccache-${{ env.CONFIG }}-kernel-${{ env.KERNEL_FULL_VER }}- || true

    - name: Upload Artifacts
      if: success() && steps.create_zip.conclusion == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: kernel-${{ env.CONFIG }}
        path: ${{ env.CONFIG }}/artifacts/

