name: Build OnePlus EmberHeart Kernel

permissions:
  contents: write
  actions: write

inputs:
  op_config_json:
    description: 'JSON string containing full device config'
    required: true
    type: string
  ksun_branch_or_hash:
    required: true
    type: string
    default: ""
  susfs_commit_hash_or_branch:
    required: false
    type: string
    default: "dev"
  optimize_level:
    required: false
    type: string
    default: O2  # Choices: O2 or O3
  kernel_uname:
    required: false
    type: string
    default: "EmberHeart"
  manifest:
    required: true
    type: string
    default: OOS15

outputs:
  kernel_version:
    value: ${{ steps.save_metadata.outputs.kernel_version }}
  ksu_version:
    value: ${{ steps.save_metadata.outputs.ksu_version }}
  susfs_version:
    value: ${{ steps.save_metadata.outputs.susfs_version }}
  image_sha256:
    value: ${{ steps.collect_stats.outputs.image_sha256 }}
  warnings:
    value: ${{ steps.collect_stats.outputs.warnings }}

runs:
  using: composite
  steps:
    - name: Parse op_config_json
      shell: bash
      run: |
        set -euo pipefail
        echo '${{ inputs.op_config_json }}' > /tmp/config.json
        jq -r 'to_entries[] | "\(.key | ascii_upcase)=\(.value)"' /tmp/config.json >> "$GITHUB_ENV"
        echo "Parsed config:"
        jq '.' /tmp/config.json

    - name: Set Manifest
      shell: bash
      run: |
        set -euo pipefail
        echo "MANIFEST=$MANIFEST_${{ inputs.manifest }}" >> "$GITHUB_ENV"

    - name: Validate Inputs
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Validate inputs"
        model="$MODEL"
        soc="$SOC"
        branch="$BRANCH"
        manifest="$MANIFEST"
        optimize='${{ inputs.optimize_level }}'

        # Non-empty checks
        [[ -n "$model" ]] || { echo "Input 'model' cannot be empty"; exit 1; }
        [[ -n "$soc" ]] || { echo "Input 'soc' cannot be empty"; exit 1; }
        [[ -n "$branch" ]] || { echo "Input 'branch' cannot be empty"; exit 1; }
        [[ -n "$manifest" ]] || { echo "Input 'manifest' cannot be empty"; exit 1; }

        # Basic format checks
        # soc: allow letters, digits, underscores, dashes (e.g., sm8650)
        if ! [[ "$soc" =~ ^[A-Za-z0-9_-]+$ ]]; then
          echo "Input 'soc' contains invalid characters. Allowed: letters, digits, underscore, dash"; exit 1
        fi
        # branch: allow common ref patterns; spaces not allowed
        if ! [[ "$branch" =~ ^[A-Za-z0-9._/-]+$ ]]; then
          echo "Input 'branch' contains invalid characters. Allowed: letters, digits, ., _, -, /"; exit 1
        fi
        # manifest: either HTTPS URL ending with .xml, or a filename ending with .xml (no spaces)
        if [[ "$manifest" == http*://* ]]; then
          if ! [[ "$manifest" =~ ^https:// ]]; then
            echo "Manifest URL must be HTTPS"; exit 1
          fi
          if ! [[ "$manifest" =~ \.xml($|\?) ]]; then
            echo "Manifest URL should point to an XML file (.xml)"; exit 1
          fi
        else
          if ! [[ "$manifest" =~ \.xml$ ]]; then
            echo "Manifest filename must end with .xml"; exit 1
          fi
          if [[ "$manifest" =~ [[:space:]] ]]; then
            echo "Manifest filename cannot contain spaces"; exit 1
          fi
        fi
        # Optimize level validation
        case "$optimize" in
          O2|O3) ;;
          *) echo "optimize_level must be O2 or O3; got '$optimize'"; exit 1 ;;
        esac
        echo "Input validation OK."
        echo "::endgroup::"

    - name: Aggressive cleanup
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Cleanup space"
        # Remove .NET SDKs
        sudo rm -rf /usr/share/dotnet
        # Remove Swift toolchain
        sudo rm -rf /usr/share/swift
        # Remove Haskell (GHC)
        sudo rm -rf /usr/local/.ghcup
        # Remove Julia
        sudo rm -rf /usr/local/julia*
        # Remove Android SDKs
        sudo rm -rf /usr/local/lib/android
        # Remove Chromium (optional if not using for browser tests)
        sudo rm -rf /usr/local/share/chromium
        # Remove Microsoft/Edge and Google Chrome builds
        sudo rm -rf /opt/microsoft /opt/google
        # Remove Azure CLI
        sudo rm -rf /opt/az
        # Remove PowerShell
        sudo rm -rf /usr/local/share/powershell
        # Remove CodeQL and other toolcaches
        sudo rm -rf /opt/hostedtoolcache
        docker system prune -af || true
        docker builder prune -af || true
        df -h
        echo "::endgroup::"

    - name: Install Minimal Dependencies
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Install deps"
        sudo apt-get -o Acquire::Retries=3 update -qq
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
          git curl ca-certificates build-essential clang lld flex bison \
          libelf-dev libssl-dev libncurses-dev zlib1g-dev liblz4-tool \
          libxml2-utils rsync unzip dwarves file python3 ccache
        sudo apt-get clean
        echo "::endgroup::"

    - name: Setup Base Environment
      shell: bash
      run: |
        set -euo pipefail
        # Derive a unique build directory name
        CONFIG="$MODEL"
        echo "CONFIG=$CONFIG" >> "$GITHUB_ENV"
        # Install repo tool if missing
        REPO="/usr/local/bin/repo"
        if [ ! -x "$REPO" ]; then
          curl -s https://storage.googleapis.com/git-repo-downloads/repo -o "$REPO"
          chmod +x "$REPO"
        fi
        echo "REPO=$REPO" >> "$GITHUB_ENV"

    - name: Optimize Global Git for Repo Tool
      shell: bash
      run: |
        set -euo pipefail
        git config --global feature.manyFiles true
        git config --global core.fsmonitor true
        git config --global pack.sparse true

    - name: Initialize and Sync Kernel Source (MediaTek MT6897)
      shell: bash
      run: |
        set -euo pipefail
        # ------------------------------------------------------------------
        # El Nord CE5 es MediaTek MT6897 (Dimensity 8350), NO Qualcomm.
        # OnePlusOSS/kernel_manifest solo aloja Snapdragon, asi que en lugar
        # de `repo init/sync` clonamos directamente los dos repos GKI/vendor
        # de OnePlusOSS para mt6897 (rama del config: $BRANCH):
        #   - android_kernel_oneplus_mt6897              -> kernel_platform/common  (GKI 6.1)
        #   - android_kernel_modules_and_devicetree_..._mt6897 -> vendor + DT
        # Replica el layout que el resto del action espera (kernel_platform/common,
        # kernel_platform/vendor) para que KSU/SUSFS/patches funcionen igual que en QCOM.
        # ------------------------------------------------------------------
        echo "Creating folder for configuration: $CONFIG"
        mkdir -p "$CONFIG/kernel_platform"
        cd "$CONFIG/kernel_platform"

        GKI_REPO="https://github.com/OnePlusOSS/android_kernel_oneplus_mt6897.git"
        VND_REPO="https://github.com/OnePlusOSS/android_kernel_modules_and_devicetree_oneplus_mt6897.git"
        REV="$BRANCH"   # ej: oneplus/mt6897_b_16.0.0_nord_ce5

        clone_retry() {
          local url="$1" ref="$2" dst="$3"
          for i in 1 2 3; do
            if git clone --depth=1 --branch "$ref" --single-branch "$url" "$dst"; then
              return 0
            fi
            echo "clone $dst attempt $i failed; retrying..."; rm -rf "$dst"; sleep 20
          done
          return 1
        }

        echo "Cloning GKI common (kernel 6.1) ..."
        clone_retry "$GKI_REPO" "$REV" common \
          || { echo "GKI clone failed"; exit 1; }

        echo "Cloning vendor + devicetree ..."
        clone_retry "$VND_REPO" "$REV" .vnd_dt \
          || { echo "vendor/DT clone failed"; exit 1; }

        # El repo vendor trae 'vendor/' y 'kernel/' (kernel_device_modules); los
        # exponemos bajo kernel_platform/ para que el parche 0006 (ruta
        # vendor/oplus/kernel/mm/hybridswap_zram/...) y los modulos OPLUS resuelvan.
        if [ -d .vnd_dt/vendor ]; then
          rsync -a .vnd_dt/vendor/ ./vendor/
        fi
        if [ -d .vnd_dt/kernel ]; then
          rsync -a .vnd_dt/kernel/ ./kernel_device_modules/ 2>/dev/null || true
        fi
        rm -rf .vnd_dt

        echo "Layout:"
        ls -d common vendor 2>/dev/null || true
        test -f common/Makefile || { echo "common/Makefile missing after clone"; exit 1; }
        test -f common/arch/arm64/configs/gki_defconfig || { echo "gki_defconfig missing"; exit 1; }

    - name: Get Kernel Version Info
      shell: bash
      run: |
        set -euo pipefail
        CONFIG_DIR="$GITHUB_WORKSPACE/$CONFIG"
        ARTIFACTS_DIR="$CONFIG_DIR/artifacts"
        mkdir -p "$ARTIFACTS_DIR"
        cd "$CONFIG_DIR/kernel_platform/common"
        CONFIG_FILES=("build.config.common" "build.config.constants")
        BRANCH_LINE=""
        for f in "${CONFIG_FILES[@]}"; do
          if [ -f "$f" ]; then
            l=$(grep '^[[:space:]]*BRANCH=' "$f" || true)
            if [ -n "$l" ]; then BRANCH_LINE="$l"; break; fi
          fi
        done
        if [ -z "$BRANCH_LINE" ]; then
          echo "Error: No BRANCH= found"; exit 1
        fi
        BRANCH_VALUE="${BRANCH_LINE#*=}"
        ANDROID_VERSION="${BRANCH_VALUE%-*}"
        if [ -z "$ANDROID_VERSION" ]; then
          echo "Could not parse android version from BRANCH=$BRANCH_VALUE"
          exit 1
        fi
        VERSION=$(grep '^VERSION *=' Makefile | awk '{print $3}')
        PATCHLEVEL=$(grep '^PATCHLEVEL *=' Makefile | awk '{print $3}')
        SUBLEVEL=$(grep '^SUBLEVEL *=' Makefile | awk '{print $3}')
        FULL_VERSION="$VERSION.$PATCHLEVEL.$SUBLEVEL"
        cd "$ARTIFACTS_DIR"
        echo "$ANDROID_VERSION-$FULL_VERSION" > "${MODEL}.txt"
        echo "ANDROID_VER=$ANDROID_VERSION" >> "$GITHUB_ENV"
        echo "KERNEL_VER=$VERSION.$PATCHLEVEL" >> "$GITHUB_ENV"
        echo "KERNEL_FULL_VER=$ANDROID_VERSION-$FULL_VERSION" >> "$GITHUB_ENV"
        echo "SUSFS_KERNEL_BRANCH=gki-$ANDROID_VERSION-$VERSION.$PATCHLEVEL" >> "$GITHUB_ENV"

    - name: Set Build Identity
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Set build user/host"

        BUILD_USER="EmberHeart"
        BUILD_HOST="OnePlus"

        echo "KBUILD_BUILD_USER=$BUILD_USER" >> "$GITHUB_ENV"
        echo "KBUILD_BUILD_HOST=$BUILD_HOST" >> "$GITHUB_ENV"

        echo ""
        echo "✅ Build identity configured:"
        echo "   User: $BUILD_USER"
        echo "   Host: $BUILD_HOST"
        echo "::endgroup::"

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2.19
      with:
        key: ${{ env.CONFIG }}-kernel-${{ env.KERNEL_FULL_VER }}
        max-size: 5G
        append-timestamp: false
        create-symlink: true
        job-summary: 'CCache stats'
        evict-old-files: 'job'

    - name: Clone AnyKernel3 and Other Dependencies
      shell: bash
      run: |
        set -euo pipefail
        echo "Cloning AnyKernel3 and other dependencies..."
        ANYKERNEL_BRANCH="gki-2.0"
        if [[ -z "${{ inputs.susfs_commit_hash_or_branch }}" ]]; then
          SUSFS_BRANCH="${{ env.SUSFS_KERNEL_BRANCH }}"
        else
          SUSFS_BRANCH="${{ inputs.susfs_commit_hash_or_branch }}"
        fi
        echo "Using AnyKernel3 branch: $ANYKERNEL_BRANCH"
        echo "Using SUSFS branch: $SUSFS_BRANCH"
        git clone --depth=1 https://github.com/TheWildJames/AnyKernel3.git -b "$ANYKERNEL_BRANCH"
        git clone --depth=1 https://github.com/TheWildJames/kernel_patches.git
        # NOTA: ya no se clona nullptr-t-oss/kernel_patches (my_patches): sus
        # parches op11/common + op11/msm fueron portados/verificados para el
        # Nord CE5 (mt6897) y ahora viven versionados en este repo
        # (patches/optimize/ y patches/nethunter/).
        git clone https://gitlab.com/simonpunk/susfs4ksu.git
        cd susfs4ksu
        if git rev-parse --verify "origin/$SUSFS_BRANCH" >/dev/null 2>&1 || git rev-parse --verify "$SUSFS_BRANCH" >/dev/null 2>&1; then
          git checkout "$SUSFS_BRANCH"
          SUSFS_COMMIT_SHA=$(git rev-parse HEAD)
          echo "SUSFS_COMMIT_SHA=$SUSFS_COMMIT_SHA" >> $GITHUB_ENV
        else
          echo "Error: SUSFS branch or ref '$SUSFS_BRANCH' not found."
          exit 1
        fi

    - name: Clean Up ABI Protected Exports
      shell: bash
      run: |
        set -euo pipefail
        cd "$CONFIG/kernel_platform"
        rm -f common/android/abi_gki_protected_exports_* || true
        rm -f msm-kernel/android/abi_gki_protected_exports_* || true
        df -h

    - name: Add KernelSU Next
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Add KernelSU Next"
        cd "$CONFIG/kernel_platform"
        echo "Adding KernelSU Next..."
        if [ "${{ inputs.ksun_branch_or_hash }}" = "" ]; then
          curl --fail --location --proto '=https' -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/dev/kernel/setup.sh" | bash -
        else
          curl --fail --location --proto '=https' -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/dev/kernel/setup.sh" | bash -s "${{ inputs.ksun_branch_or_hash }}"
        fi
        git submodule update --init --recursive
        cd KernelSU-Next/kernel

        COMMITS_COUNT=$(/usr/bin/git rev-list --count HEAD)

        if [ $COMMITS_COUNT -lt 2684 ]; then
          BASE_VERSION=10200
        else
          BASE_VERSION=30000
        fi

        KSU_VERSION=$(expr $COMMITS_COUNT "+" $BASE_VERSION)
        sed -i "s/DKSU_VERSION=11998/DKSU_VERSION=${KSU_VERSION}/" Makefile

        if [ "$KSU_VERSION" -lt 12884 ]; then
          echo "NEED_HOOKS=true" >> $GITHUB_ENV
        else
          echo "NEED_HOOKS=false" >> $GITHUB_ENV
        fi

        cd ..
        KSUN_COMMIT_SHA=$(git rev-parse HEAD)
        echo "KSUN_COMMIT_SHA=$KSUN_COMMIT_SHA" >> $GITHUB_ENV

        echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
        echo "KernelSU Next Version: $KSU_VERSION"
        echo "KernelSU Next added (commit: ${KSUN_COMMIT_SHA:0:8}) ✅"
        echo "::endgroup::"

    - name: Apply SUSFS Patches
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Applying SUSFS patches..."
        cd "$CONFIG/kernel_platform"
        cp ../../susfs4ksu/kernel_patches/50_add_susfs_in_${{ env.SUSFS_KERNEL_BRANCH }}.patch ./common/
        cp ../../susfs4ksu/kernel_patches/fs/* ./common/fs/
        cp ../../susfs4ksu/kernel_patches/include/linux/* ./common/include/linux/
        cd ./KernelSU-Next
        susfs_version=$(grep '#define SUSFS_VERSION' ../common/include/linux/susfs.h | awk -F'"' '{print $2}')
        echo "SUSVER=$susfs_version" >> $GITHUB_ENV
        echo "SuSFS Version: $susfs_version"
        cd ../
        # Function to compare semantic versions
        version_lte() {
          [ "$(printf '%s\n' "$2" "$1" | sort -V | head -n1)" = "$1" ]
        }

        if version_lte "${susfs_version:1}" "1.5.12"; then
          echo "NEED_HOOKS=true" >> $GITHUB_ENV
        else
          echo "NEED_HOOKS=false" >> $GITHUB_ENV
        fi

        case "$susfs_version" in
          "v1.5.8")
            cd ./KernelSU-Next
            cp ../../../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ./
            patch -p1 --forward --fuzz=3 < 10_enable_susfs_for_ksu.patch  || true
            cp "../../../kernel_patches/next/susfs_fix_patches/$susfs_version/fix_apk_sign.c.patch" ./
            patch -p1 --forward --fuzz=3 < fix_apk_sign.c.patch
            cp "../../../kernel_patches/next/susfs_fix_patches/$susfs_version/fix_core_hook.c.patch" ./
            patch -p1 --forward --fuzz=3 < fix_core_hook.c.patch
            cp "../../../kernel_patches/next/susfs_fix_patches/$susfs_version/fix_selinux.c.patch" ./
            patch -p1 --forward --fuzz=3 < fix_selinux.c.patch
            cp "../../../kernel_patches/next/susfs_fix_patches/$susfs_version/fix_ksud.c.patch" ./
            patch -p1 --forward --fuzz=3 < fix_ksud.c.patch
            ;;
          "v1.5.9"|"v1.5.10"|"v1.5.11"|"v1.5.12")
            cd ./KernelSU-Next
            cp ../../../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ./
            patch -p1 --forward < 10_enable_susfs_for_ksu.patch  || true
            for file in $(find ./kernel -maxdepth 2 -name "*.rej" -printf "%f\n" | cut -d'.' -f1); do
              echo "Patching file: $file.c with fix_$file.c.patch"
              patch -p1 --forward < "../../../kernel_patches/next/susfs_fix_patches/$susfs_version/fix_$file.c.patch"
            done
            patch -p1 --forward < "../../../kernel_patches/next/susfs_fix_patches/$susfs_version/fix_kernel_compat.c.patch"
            ;;
          "v2.0.0")
            cd ./KernelSU-Next
            cp ../../../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ./

            patch -p1 --forward < 10_enable_susfs_for_ksu.patch  || true

            for file in $(find ./kernel -maxdepth 2 -name "*.rej" -exec basename {} .rej \;); do
              echo "Patching file: $file with fix_$file.patch"
              patch -p1 --forward < "../../../kernel_patches/next/susfs_fix_patches/$susfs_version/fix_$file.patch"
            done
            echo "Patching Hook Mode!"
            patch -p1 --forward < "../../../kernel_patches/next/susfs_fix_patches/$susfs_version/overwrite_hook_mode.patch"
            echo "Patching KSU_TOOLKIT Support for SuSFS kernel!"
            patch -p1 --forward < "../../../kernel_patches/next/susfs_fix_patches/$susfs_version/ksu_toolkit.patch"
            ;;
          "v2.1.0")
            cd ./KernelSU-Next
            # Resolver de ruta para parches susfs_fix: el repo TheWildJames/kernel_patches
            # reorganiza estos parches entre next/susfs_fix_patches/<ver>/ (plano) y
            # next/susfs_fix_patches/stable/<ver>/. Busca en ambas ubicaciones.
            SFX_BASE="../../../kernel_patches/next/susfs_fix_patches"
            sf() {
              # $1 = nombre de archivo del parche -> imprime la primera ruta existente
              if [ -f "$SFX_BASE/$susfs_version/$1" ]; then
                echo "$SFX_BASE/$susfs_version/$1"
              elif [ -f "$SFX_BASE/stable/$susfs_version/$1" ]; then
                echo "$SFX_BASE/stable/$susfs_version/$1"
              else
                echo ""
              fi
            }
            apply_sf() {
              # $1 = nombre de archivo; $2 = "required" para abortar si falta (default opcional)
              local p; p="$(sf "$1")"
              if [ -n "$p" ]; then
                patch -p1 --forward --fuzz=3 < "$p" || true
              elif [ "$2" = "required" ]; then
                echo "::error::Parche SUSFS requerido ausente: $1 (buscado en $susfs_version/ y stable/$susfs_version/)"
                exit 1
              else
                echo "::warning::$1 ausente en $susfs_version (ni en stable/), skip"
              fi
            }
            patch -p1 --forward < "../../../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch" || true
            for file in $(find ./kernel -maxdepth 2 -name "*.rej" -exec basename {} .rej \;); do
              echo "Patching file: $file with fix_$file.patch"
              apply_sf "fix_$file.patch"
            done
            echo "Patching Hook Mode!"
            apply_sf "overwrite_hook_mode.patch"
            echo "Patching KSU_TOOLKIT Support for SusFS kernel!"
            apply_sf "ksu_toolkit.patch"
            echo "Patching Multi-manager Support for SusFS kernel!"
            apply_sf "multi_manager.patch"
            echo "Patching Multi-manager sepolicy Support for SusFS kernel!"
            apply_sf "multi_sepolicy_fix.patch"
            ;;
          *)
            echo "::error::Unsupported SUSFS version: $susfs_version"
            exit 1
            ;;
        esac
        patch -p1 --forward < ksun_susfs_latest.patch || true
        cd ../common
        if [ "${{ env.ANDROID_VER }}" = "android15" ] && [ "${{ env.KERNEL_VER }}" = "6.6" ]; then
          if ! grep -qxF '#include <trace/hooks/fs.h>' ./fs/namespace.c; then
            sed -i '/#include <trace\/hooks\/blk.h>/a #include <trace\/hooks\/fs.h>' ./fs/namespace.c
          fi
        fi

        # Fake kernel patch to fix failures
        fake_patched=0
        if [ "${{ env.ANDROID_VER }}" = "android15" ] && [ "${{ env.KERNEL_VER }}" = "6.6" ]; then
          if ! grep -qxF $'\tunsigned int nr_subpages = __PAGE_SIZE / PAGE_SIZE;' ./fs/proc/task_mmu.c; then
            echo "nr_subpages Line not found. Fake Patching!"
            sed -i -e '/int ret = 0, copied = 0;/a \\tunsigned int nr_subpages \= __PAGE_SIZE \/ PAGE_SIZE;' -e '/int ret = 0, copied = 0;/a \\tpagemap_entry_t \*res = NULL;' ./fs/proc/task_mmu.c
            fake_patched=1
          fi
        fi
        if [ "${{ env.ANDROID_VER }}" = "android12" ] && [ "${{ env.KERNEL_VER }}" = "5.10" ]; then
          if ! grep -qxF $'\tif (!vma_pages(vma))' ./fs/proc/task_mmu.c; then
            echo "vma_pages Line not found. Fake Patching!"
            fake_patched=1
          fi
        fi
        if [ "${{ env.ANDROID_VER }}" = "android13" ] && [ "${{ env.KERNEL_VER }}" = "5.15" ]; then
          if ! grep -qxF $'\tif (!vma_pages(vma))' ./fs/proc/task_mmu.c; then
            echo "vma_pages Line not found. Fake Patching!"
            fake_patched=1
          fi
        fi

        # --fuzz=3: el arbol GKI 6.1 del Nord CE5 (mt6897) difiere en algunas
        # lineas de contexto (p.ej. fs/proc/base.c no incluye <linux/dma-buf.h>),
        # lo que hacia fallar Hunk #1 y abortar con exit 1. Con fuzz=3 los 4 hunks
        # de base.c y el resto del parche aplican limpios (verificado con dry-run).
        patch -p1 --fuzz=3 < 50_add_susfs_in_${{ env.SUSFS_KERNEL_BRANCH }}.patch

        # Revert Fake kernel patch
        if [ "$fake_patched" = 1 ]; then
          if [ "${{ env.ANDROID_VER }}" = "android15" ] && [ "${{ env.KERNEL_VER }}" = "6.6" ]; then
            if grep -qxF $'\tunsigned int nr_subpages = __PAGE_SIZE / PAGE_SIZE;' ./fs/proc/task_mmu.c; then
              echo "nr_subpages Line found. Revert Fake Patching!"
              sed -i -e '/unsigned int nr_subpages \= __PAGE_SIZE \/ PAGE_SIZE;/d' -e '/pagemap_entry_t \*res = NULL;/d' ./fs/proc/task_mmu.c
            fi
          fi
          if [ "${{ env.ANDROID_VER }}" = "android12" ] && [ "${{ env.KERNEL_VER }}" = "5.10" ]; then
            if grep -qxF $'\t\t\tgoto show_pad;' ./fs/proc/task_mmu.c; then
              echo "vma_pages Line found. Revert Fake Patching!"
              sed -i -e 's/goto show_pad;/return 0;/' ./fs/proc/task_mmu.c
            fi
          fi
          if [ "${{ env.ANDROID_VER }}" = "android13" ] && [ "${{ env.KERNEL_VER }}" = "5.15" ]; then
            if grep -qxF $'\t\t\tgoto show_pad;' ./fs/proc/task_mmu.c; then
              echo "vma_pages Line found. Revert Fake Patching!"
              sed -i -e 's/goto show_pad;/return 0;/' ./fs/proc/task_mmu.c
            fi
          fi
          if [ "${{ env.ANDROID_VER }}" = "android14" ] && [ "${{ env.KERNEL_VER }}" = "6.1" ]; then
            if grep -qxF $'\t\t\tgoto show_pad;' ./fs/proc/task_mmu.c; then
              echo "vma_pages Line found. Revert Fake Patching!"
              sed -i -e 's/goto show_pad;/return 0;/' ./fs/proc/task_mmu.c
            fi
          fi
        fi

        KERNEL_VERSION="${{ env.KERNEL_VER }}"
        MIN_VERSION="5.16"
