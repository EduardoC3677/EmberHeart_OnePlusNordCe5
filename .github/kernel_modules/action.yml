name: Build OnePlus kernel modules

permissions:
  contents: write
  actions: write

inputs:
  op_config_json:
    description: 'JSON string containing full device config'
    required: true
    type: string
  optimize_level:
    required: false
    type: string
    default: O2  # Choices: O2 or O3
  manifest:
    required: true
    type: string
    default: OOS15

runs:
  using: composite
  steps:
    - name: Parse op_config_json
      shell: bash
      run: |
        set -euo pipefail
        echo '${{ inputs.op_config_json }}' > /tmp/config.json
        jq -r 'to_entries[] | "\(.key | ascii_upcase)=\(.value)"' /tmp/config.json >> "$GITHUB_ENV"
        echo "Parsed config:"
        jq '.' /tmp/config.json
    
    - name: Set Manifest
      shell: bash
      run: |
        set -euo pipefail
        echo "MANIFEST=$MANIFEST_${{ inputs.manifest }}_MODULES" >> "$GITHUB_ENV"

    - name: Validate Inputs
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Validate inputs"
        model="$MODEL"
        soc="$SOC"
        branch="$BRANCH"
        manifest="$MANIFEST"
        optimize='${{ inputs.optimize_level }}'
    
        # Non-empty checks
        [[ -n "$model" ]] || { echo "Input 'model' cannot be empty"; exit 1; }
        [[ -n "$soc" ]] || { echo "Input 'soc' cannot be empty"; exit 1; }
        [[ -n "$branch" ]] || { echo "Input 'branch' cannot be empty"; exit 1; }
        [[ -n "$manifest" ]] || { echo "Input 'manifest' cannot be empty"; exit 1; }
    
        # Basic format checks
        # soc: allow letters, digits, underscores, dashes (e.g., sm8650)
        if ! [[ "$soc" =~ ^[A-Za-z0-9_-]+$ ]]; then
          echo "Input 'soc' contains invalid characters. Allowed: letters, digits, underscore, dash"; exit 1
        fi    
        # branch: allow common ref patterns; spaces not allowed
        if ! [[ "$branch" =~ ^[A-Za-z0-9._/-]+$ ]]; then
          echo "Input 'branch' contains invalid characters. Allowed: letters, digits, ., _, -, /"; exit 1
        fi    
        # manifest: either HTTPS URL ending with .xml, or a filename ending with .xml (no spaces)
        if [[ "$manifest" == http*://* ]]; then
          if ! [[ "$manifest" =~ ^https:// ]]; then
            echo "Manifest URL must be HTTPS"; exit 1
          fi
          if ! [[ "$manifest" =~ \.xml($|\?) ]]; then
            echo "Manifest URL should point to an XML file (.xml)"; exit 1
          fi
        else
          if ! [[ "$manifest" =~ \.xml$ ]]; then
            echo "Manifest filename must end with .xml"; exit 1
          fi
          if [[ "$manifest" =~ [[:space:]] ]]; then
            echo "Manifest filename cannot contain spaces"; exit 1
          fi
        fi
        # Optimize level validation
        case "$optimize" in
          O2|O3) ;;
          *) echo "optimize_level must be O2 or O3; got '$optimize'"; exit 1 ;;
        esac
        echo "Input validation OK."
        echo "::endgroup::"

    - name: Aggressive cleanup
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Cleanup space"
        # Remove .NET SDKs
        sudo rm -rf /usr/share/dotnet
        # Remove Swift toolchain
        sudo rm -rf /usr/share/swift
        # Remove Haskell (GHC)
        sudo rm -rf /usr/local/.ghcup
        # Remove Julia
        sudo rm -rf /usr/local/julia*
        # Remove Android SDKs
        sudo rm -rf /usr/local/lib/android
        # Remove Chromium (optional if not using for browser tests)
        sudo rm -rf /usr/local/share/chromium
        # Remove Microsoft/Edge and Google Chrome builds
        sudo rm -rf /opt/microsoft /opt/google
        # Remove Azure CLI
        sudo rm -rf /opt/az
        # Remove PowerShell
        sudo rm -rf /usr/local/share/powershell
        # Remove CodeQL and other toolcaches
        sudo rm -rf /opt/hostedtoolcache
        docker system prune -af || true
        docker builder prune -af || true
        df -h
        echo "::endgroup::"

    - name: Install Minimal Dependencies
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Install deps"
        sudo apt-get -o Acquire::Retries=3 update -qq
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
          git curl ca-certificates build-essential clang lld flex bison \
          libelf-dev libssl-dev libncurses-dev zlib1g-dev liblz4-tool \
          libxml2-utils rsync unzip dwarves file python3 ccache
        sudo apt-get clean
        echo "::endgroup::"

    - name: Setup Base Environment
      shell: bash
      run: |
        set -euo pipefail
        # Derive a unique build directory name
        CONFIG="$MODEL"
        echo "CONFIG=$CONFIG" >> "$GITHUB_ENV"
        # Install repo tool if missing
        REPO="/usr/local/bin/repo"
        if [ ! -x "$REPO" ]; then
          curl -s https://storage.googleapis.com/git-repo-downloads/repo -o "$REPO"
          chmod +x "$REPO"
        fi
        echo "REPO=$REPO" >> "$GITHUB_ENV"

    - name: Initialize and Sync Kernel Source (MediaTek MT6897)
      shell: bash
      run: |
        set -euo pipefail
        # Nord CE5 = MediaTek MT6897 (no QCOM). Clonamos los repos GKI+vendor
        # de OnePlusOSS para mt6897 en vez de usar repo/kernel_manifest.
        echo "Creating folder for configuration: $CONFIG"
        mkdir -p "$CONFIG/kernel_platform"
        cd "$CONFIG/kernel_platform"

        GKI_REPO="https://github.com/OnePlusOSS/android_kernel_oneplus_mt6897.git"
        VND_REPO="https://github.com/OnePlusOSS/android_kernel_modules_and_devicetree_oneplus_mt6897.git"
        REV="$BRANCH"

        clone_retry() {
          local url="$1" ref="$2" dst="$3"
          for i in 1 2 3; do
            if git clone --depth=1 --branch "$ref" --single-branch "$url" "$dst"; then
              return 0
            fi
            echo "clone $dst attempt $i failed; retrying..."; rm -rf "$dst"; sleep 20
          done
          return 1
        }

        clone_retry "$GKI_REPO" "$REV" common || { echo "GKI clone failed"; exit 1; }
        clone_retry "$VND_REPO" "$REV" .vnd_dt || { echo "vendor/DT clone failed"; exit 1; }
        [ -d .vnd_dt/vendor ] && rsync -a .vnd_dt/vendor/ ./vendor/
        [ -d .vnd_dt/kernel ] && { rsync -a .vnd_dt/kernel/ ./kernel_device_modules/ 2>/dev/null || true; }
        rm -rf .vnd_dt
        test -f common/Makefile || { echo "common/Makefile missing"; exit 1; }

    - name: Get Kernel Version Info
      shell: bash
      run: |
        set -euo pipefail
        CONFIG_DIR="$GITHUB_WORKSPACE/$CONFIG"
        ARTIFACTS_DIR="$CONFIG_DIR/artifacts"
        mkdir -p "$ARTIFACTS_DIR"
        cd "$CONFIG_DIR/kernel_platform/common"
        CONFIG_FILES=("build.config.common" "build.config.constants")
        BRANCH_LINE=""
        for f in "${CONFIG_FILES[@]}"; do
          if [ -f "$f" ]; then
            l=$(grep '^[[:space:]]*BRANCH=' "$f" || true)
            if [ -n "$l" ]; then BRANCH_LINE="$l"; break; fi
          fi
        done
        if [ -z "$BRANCH_LINE" ]; then
          echo "Error: No BRANCH= found"; exit 1
        fi
        BRANCH_VALUE="${BRANCH_LINE#*=}"
        ANDROID_VERSION="${BRANCH_VALUE%-*}"
        if [ -z "$ANDROID_VERSION" ]; then
          echo "Could not parse android version from BRANCH=$BRANCH_VALUE"
          exit 1
        fi
        VERSION=$(grep '^VERSION *=' Makefile | awk '{print $3}')
        PATCHLEVEL=$(grep '^PATCHLEVEL *=' Makefile | awk '{print $3}')
        SUBLEVEL=$(grep '^SUBLEVEL *=' Makefile | awk '{print $3}')
        FULL_VERSION="$VERSION.$PATCHLEVEL.$SUBLEVEL"
        cd "$ARTIFACTS_DIR"
        echo "ANDROID_VER=$ANDROID_VERSION" >> "$GITHUB_ENV"
        echo "KERNEL_VER=$VERSION.$PATCHLEVEL" >> "$GITHUB_ENV"
        echo "KERNEL_FULL_VER=$ANDROID_VERSION-$FULL_VERSION" >> "$GITHUB_ENV"
        echo "SUSFS_KERNEL_BRANCH=gki-$ANDROID_VERSION-$VERSION.$PATCHLEVEL" >> "$GITHUB_ENV"

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2.19
      with:
        key: ${{ env.CONFIG }}-modules-${{ env.KERNEL_FULL_VER }}
        max-size: 5G
        append-timestamp: false
        create-symlink: true
        job-summary: 'CCache stats'
        evict-old-files: 'job'

    - name: Prepare Nethunter patches (from this repo)
      shell: bash
      run: |
        set -euo pipefail
        # Los parches Nethunter wifi-injection ahora viven en este repo
        # (patches/nethunter/) y se aplican sobre el GKI common mas abajo.
        # Ya no se clona nullptr-t-oss/kernel_patches aqui: en MTK no hay
        # msm-kernel y solo necesitabamos los 2 parches de inyeccion wifi,
        # que estan versionados directamente en el repo.
        echo "Nethunter patches served from repo: patches/nethunter/"

    - name: Clean Up ABI Protected Exports
      shell: bash
      run: |
        set -euo pipefail
        cd "$CONFIG/kernel_platform"
        rm -f common/android/abi_gki_protected_exports_* || true
        df -h

    - name: Merge
      shell: bash
      run: |
        set -euo pipefail
        KERNEL_PLATFORM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        MSM="$KERNEL_PLATFORM/common"
        OUT=out

        cd "$MSM"

        # NOTA: NO usar 'make mrproper' aqui. El arbol 'common' de OnePlus mt6897
        # no es GKI puro: sus Makefiles referencian subdirectorios vendor OPLUS
        # (p.ej. kernel/pgo/, drivers/soc/oplus/oplus_resctrl/) que no estan
        # presentes en este checkout. 'make clean/mrproper' desciende a TODOS los
        # subdirs listados en obj-* (independiente del CONFIG) y aborta con
        # "No rule to make target '<dir>/Makefile'". El clone es fresco, asi que
        # solo limpiamos artefactos de build previos de forma segura.
        rm -rf "$OUT" .config .config.old 2>/dev/null || true
        find . -maxdepth 1 -name '*.o' -delete 2>/dev/null || true
        mkdir -p "$OUT"

        # En QCOM se fusionaba arch/arm64/configs/vendor/${SOC}_GKI.config.
        # En MTK ese fragmento puede no existir con el mismo nombre: si esta,
        # se fusiona; si no, se usa gki_defconfig tal cual.
        FRAG="arch/arm64/configs/vendor/${SOC}_GKI.config"
        if [ -f "$FRAG" ]; then
          ./scripts/kconfig/merge_config.sh -O "$OUT" -m arch/arm64/configs/gki_defconfig "$FRAG"
          cp "$OUT/.config" arch/arm64/configs/gki_defconfig
          rm "$OUT/.config"
        else
          echo "::warning::$FRAG no existe (MTK); uso gki_defconfig sin merge"
        fi

    - name: Add nethunter specfic drivers already present in kernel to be built as modules
      shell: bash
      run: |
        set -euo pipefail
        KERNEL_PATH="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        MSM="$KERNEL_PATH/common"
        cd "$MSM"
        
        # Realtek drivers
        ./scripts/config --file arch/arm64/configs/gki_defconfig \
          --enable CONFIG_WLAN_VENDOR_REALTEK

        # ATH drivers
        ./scripts/config --file arch/arm64/configs/gki_defconfig \
          --enable CONFIG_WLAN_VENDOR_ATH \
          --module CONFIG_ATH_COMMON \
          --module CONFIG_ATH9K \
          --module CONFIG_ATH9K_HW \
          --module CONFIG_ATH9K_HTC \
          --module CONFIG_ATH9K_COMMON \
          --module CONFIG_ATH10K \
          --module CONFIG_ATH10K_USB \
          --module CONFIG_ATH11K

        # Mediatek drivers
        ./scripts/config --file arch/arm64/configs/gki_defconfig \
          --enable CONFIG_WLAN_VENDOR_MEDIATEK \
          --module CONFIG_MT7601U \
          --module CONFIG_MT76_CORE \
          --module CONFIG_MT76_CORE \
          --module CONFIG_MT76_USB \
          --module CONFIG_MT76x02_LIB \
          --module CONFIG_MT76x02_USB \
          --module CONFIG_MT76_CONNAC_LIB \
          --module CONFIG_MT7603E \
          --module CONFIG_MT76x2_COMMON \
          --module CONFIG_MT76x0_COMMON \
          --module CONFIG_MT7615_COMMON \
          --module CONFIG_MT7915E \
          --module CONFIG_MT7921E

        # Other configs
        ./scripts/config --file arch/arm64/configs/gki_defconfig \
          --module CONFIG_MAC80211_LEDS \
          --module CONFIG_CAN_SLCAN

    - name: Add Nethunter wifi-injection patches to GKI common (MediaTek MT6897)
      shell: bash
      run: |
        set -euo pipefail
        echo "Applying Nethunter wifi-injection patches to GKI common..."
        # En MTK no existe msm-kernel: los drivers wifi (mac80211/cfg80211 + USB
        # wifi como ath9k_htc, zd1211rw, rtl8187) viven en el GKI common, igual
        # que en QCOM. Estos parches son genericos (no QCOM-especificos) y se
        # aplican sobre common de forma tolerante.
        KP="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        COMMON="$KP/common"
        # Directorio de parches Nethunter dentro de este repo (action path).
        NH_DIR="$GITHUB_ACTION_PATH/../../patches/nethunter"
        if [ ! -d "$NH_DIR" ]; then
          # Fallback: ruta relativa al checkout del repo.
          NH_DIR="$GITHUB_WORKSPACE/patches/nethunter"
        fi
        echo "Nethunter patches dir: $NH_DIR"
        ls -la "$NH_DIR" || { echo "WARN: no nethunter patches dir, skipping"; exit 0; }

        cd "$COMMON"
        apply_nh() {
          local pf="$1"
          [ -f "$pf" ] || { echo "skip (missing): $pf"; return 0; }
          echo "==> Applying: $(basename "$pf")"
          # Si ya esta aplicado (reverse aplica limpio), lo saltamos.
          if patch -p1 -R --dry-run --force --fuzz=3 <"$pf" >/dev/null 2>&1; then
            echo "    already applied, skipping."
            return 0
          fi
          if patch -p1 --forward --fuzz=3 <"$pf"; then
            echo "    OK"
          else
            echo "    WARN: failed to apply $(basename "$pf") cleanly (continuing)."
          fi
        }
        # Orden: primero injection (mac80211/cfg80211 + USB wifi), luego ath9k.
        apply_nh "$NH_DIR/add-wifi-injection-4.14.patch"
        apply_nh "$NH_DIR/fix-ath9k-naming-conflict.patch"
        echo "Nethunter wifi-injection patches step done."

    - name: Add memkernel module
      shell: bash
      run: |
        set -euo pipefail
        KERNEL_PATH="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        MSM="$KERNEL_PATH/common"
        cd "$MSM"
        curl -LSs "https://raw.githubusercontent.com/Poko-Apps/MemKernel/main/kernel/setup.sh" | bash -s M br0k3n

    - name: Add rtw88 modules
      shell: bash
      run: |
        set -euo pipefail
        KERNEL_PATH="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        MSM="$KERNEL_PATH/common"
        cd "$MSM/drivers/net/wireless/realtek/"
        rm -rf rtw88
        git clone https://github.com/lwfinger/rtw88.git
        sed -i 's/$(CONFIG_RTW88)/m/g' Makefile
        sed -i '/^source "drivers\/net\/wireless\/realtek\/rtw88\/Kconfig"$/s/.*/ /' Kconfig

    - name: Detect Clang (toolchain for build)
      shell: bash
      run: |
        set -euo pipefail
        KP="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        CLANG_FOUND=false
        for base in "$KP/prebuilts" "$KP/prebuilts-master"; do
          [ -d "$base/clang/host/linux-x86" ] || continue
          latest=$(ls -d "$base"/clang/host/linux-x86/clang-r*/ 2>/dev/null | sort -V | tail -n1 || true)
          if [ -n "$latest" ] && [ -x "$latest/bin/clang" ]; then
            CLANG_BIN="$latest/bin"
            CLANG_FOUND=true
          fi
        done
        if ! $CLANG_FOUND && command -v clang >/dev/null 2>&1; then
          # Solo aceptamos el clang del sistema si trae la suite LLVM completa
          # (llvm-ar). Si falta, caemos al prebuilt AOSP (igual que kernel/action.yml).
          SYS_CLANG_BIN="$(dirname "$(command -v clang)")"
          if command -v llvm-ar >/dev/null 2>&1 || [ -x "$SYS_CLANG_BIN/llvm-ar" ]; then
            CLANG_BIN="$SYS_CLANG_BIN"
            CLANG_FOUND=true
            echo "Using system clang (llvm-ar present)."
          else
            echo "System clang found but llvm-ar missing; will fetch AOSP prebuilt."
          fi
        fi
        $CLANG_FOUND || {
          # El arbol mt6897 no incluye prebuilts/clang. Descargamos el prebuilt
          # Clang oficial de AOSP que el arbol declara en build.config.constants
          # (CLANG_VERSION=rXXXXXXX); incluye clang, ld.lld y toda la suite llvm-*
          # sin sufijo. Sin esto, LLVM=1 AR=llvm-ar falla con "llvm-ar: not found".
          echo "No prebuilt clang in tree; fetching AOSP prebuilt..."
          CV=""
          for cf in "$KP/common/build.config.constants" "$KP/common/build.config.common"; do
            [ -f "$cf" ] || continue
            v=$(grep -oE '^CLANG_VERSION=[A-Za-z0-9]+' "$cf" | head -n1 | cut -d= -f2 || true)
            if [ -n "$v" ]; then CV="$v"; break; fi
          done
          [ -n "$CV" ] || CV="r487747c"
          echo "Target AOSP Clang version: clang-$CV"
          CLANG_DIR="$KP/prebuilts/clang/host/linux-x86/clang-$CV"
          mkdir -p "$CLANG_DIR"
          DL_OK=false
          for BR in android14-release main android15-release; do
            URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/$BR/clang-$CV.tar.gz"
            echo "Trying $BR ..."
            if curl -fsSL --retry 3 --retry-delay 10 --max-time 600 "$URL" -o /tmp/clang.tar.gz; then
              if tar xzf /tmp/clang.tar.gz -C "$CLANG_DIR" 2>/dev/null && [ -x "$CLANG_DIR/bin/clang" ]; then
                DL_OK=true; rm -f /tmp/clang.tar.gz; break
              fi
            fi
            echo "  branch $BR failed; trying next"; rm -f /tmp/clang.tar.gz
          done
          $DL_OK || { echo "Failed to fetch AOSP prebuilt clang-$CV"; exit 1; }
          for t in clang ld.lld llvm-ar llvm-nm llvm-objcopy llvm-strip; do
            [ -x "$CLANG_DIR/bin/$t" ] || { echo "prebuilt missing $t"; exit 1; }
          done
          CLANG_BIN="$CLANG_DIR/bin"
          CLANG_FOUND=true
          echo "AOSP prebuilt clang ready at $CLANG_BIN"
        }
        echo "CLANG_BIN_PATH=$CLANG_BIN" >> "$GITHUB_ENV"
        CLANG_VERSION="$("$CLANG_BIN/clang" --version | head -n1)"
        echo "CLANG_VERSION=$CLANG_VERSION" >> "$GITHUB_ENV"
        echo "Detected Clang: $CLANG_VERSION"

    - name: Build Kernel Modules 
      shell: bash
      run: |
        set -euo pipefail
        KERNEL_PLATFORM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        MSM="$KERNEL_PLATFORM/common"
        cd "$MSM"

        export PATH="${CLANG_BIN_PATH}:$PATH" 
        export PATH="/usr/lib/ccache:$PATH"

        MAKE_FLAGS+=(
          LLVM=1
          LLVM_IAS=1
          ARCH=arm64
          SUBARCH=arm64
          LD=ld.lld
          HOSTLD=ld.lld
          AR=llvm-ar
          NM=llvm-nm
          OBJCOPY=llvm-objcopy
          OBJDUMP=llvm-objdump
          DEPMOD=depmod
          DTC=dtc
          STRIP=llvm-strip
          HOSTCC=clang
          HOSTCXX=clang++
          CC="ccache clang"
        )

        OUT=out
        INSTALL_MOD_PATH="$MSM/out"
        mkdir -p "$OUT"
        make "${MAKE_FLAGS[@]}" O="$OUT" gki_defconfig
        
        # Thin LTO
        ./scripts/config --file "$OUT/.config" \
            --enable CONFIG_LTO_CLANG_THIN \
            --enable CONFIG_LTO_CLANG \
            --enable CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE \
            --disable CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE_O3

        echo "Building kernel modules..."
        make "${MAKE_FLAGS[@]}" O=$OUT olddefconfig
        make -j$(nproc --all) "${MAKE_FLAGS[@]}" O="$OUT" modules
        make -j$(nproc --all) "${MAKE_FLAGS[@]}" O="$OUT" INSTALL_MOD_PATH="$INSTALL_MOD_PATH" modules_install

        cd "$KERNEL_PLATFORM"

        MAKE_FLAGS+=(
          KERNEL_SRC="$KERNEL_PLATFORM/./common"
        )

        # ------------------------------------------------------------------
        # MediaTek MT6897: NO existen los drivers QCOM (mm-drivers, qcacld,
        # camera-kernel, etc.). En su lugar compilamos out-of-tree el stack
        # vendor OPLUS de memoria (hybridswap/zram), que es justo lo que el
        # build del Image no produce y lo que la cadena de parches 0001-0006
        # arregla. Se construyen contra el GKI ya compilado (KERNEL_SRC=common).
        # ------------------------------------------------------------------
        OPLUS_FLAGS+=(
            CHIPSET_COMPANY=MTK
            OPLUS_VND_BUILD_PLATFORM="$SOC"
        )

        # Modulos vendor OPLUS (rutas relativas a kernel_platform). Solo se
        # compilan los presentes en el arbol vendor clonado.
        EXT_OPLUS=(
            ../vendor/oplus/kernel/mm/hybridswap_zram
            ../vendor/oplus/kernel/mm/kswapd_opt
            ../vendor/oplus/kernel/mm/zram_opt
        )
        # Algunos arboles usan thp_zsmalloc/hybrid_zsmalloc como dep del zram:
        for extra in \
            ../vendor/oplus/kernel/mm/thp_zsmalloc \
            ../vendor/oplus/kernel/mm/uxmem_opt ; do
          [ -d "$KERNEL_PLATFORM/$extra" ] && EXT_OPLUS+=("$extra")
        done

        for MODULE in "${EXT_OPLUS[@]}"; do
            if [ ! -d "$KERNEL_PLATFORM/$MODULE" ]; then
              echo "::warning::modulo OPLUS ausente, omito: $MODULE"; continue
            fi
            echo "== Building OPLUS module: $MODULE =="
            make -C "$MODULE" M="../$MODULE" -j$(nproc --all) "${MAKE_FLAGS[@]}" O=$MSM/out "${OPLUS_FLAGS[@]}" modules \
              || { echo "::warning::fallo compilando $MODULE, continuo"; continue; }
            make -C "$MODULE" M="../$MODULE" -j$(nproc --all) "${MAKE_FLAGS[@]}" O=$MSM/out "${OPLUS_FLAGS[@]}" INSTALL_MOD_PATH=$INSTALL_MOD_PATH modules_install \
              || echo "::warning::fallo instalando $MODULE, continuo"
        done

    - name: Filter modules
      shell: bash
      run: |
        set -euo pipefail
        KERNEL_PLATFORM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        MSM="$KERNEL_PLATFORM/common"
        OUT="$MSM/out"
        UNAME=$(ls "$OUT/lib/modules/")

        echo "Copying all modules to $OUT/modules"
        cd "$OUT"
        mkdir -p modules
        find lib/modules/"$UNAME" -type f -name '*.ko' -exec cp {} modules/ \;
        echo "Total modules copied: $(find modules -type f -name '*.ko' | wc -l)"

        echo "Removing unnecessary modules..."
        cd modules
        # Download default module list
        curl -L -o default_modules.txt https://raw.githubusercontent.com/nullptr-t-oss/kernel_patches/refs/heads/main/default_modules.txt
        # Remove modules in the default list

        while IFS= read -r module; do
          if [ -e "$module" ]; then
            rm -f "$module"
            echo "Removed module: $module"
          fi
        done < default_modules.txt
        cd ..
        echo "Modules remaining after filtering: $(find modules -type f -name '*.ko' | wc -l)"

    - name: Create Kernel Modules zip
      id: create_zip
      shell: bash
      run: |
        set -euo pipefail
        CONFIG_DIR="$GITHUB_WORKSPACE/$CONFIG"
        KERNEL_PLATFORM="$CONFIG_DIR/kernel_platform"
        MSM="$KERNEL_PLATFORM/common"
        OUT="$MSM/out"
        MODULES_SRC="$OUT/modules"
        MODULES_ZIP="$CONFIG_DIR/artifacts/kernel_modules_${{ env.MODEL }}.zip"
        mkdir -p "$CONFIG_DIR/artifacts"
        find "$MODULES_SRC" -type f -name '*.ko' -print0 | xargs -0 zip -j "$MODULES_ZIP"
        echo "Packaged kernel modules to $MODULES_ZIP"

    - name: Final Build Summary
      shell: bash
      run: |
        set -euo pipefail
        {
          echo "CCache Statistics :"
          echo "$(/usr/bin/ccache -s)"
        } | tee summary.txt
        {
          echo "### Kernel Modules Build Summary"
          echo ""
          echo "CCache Statistics :"
          echo "$(ccache -s -v)"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Cleanup old ccache
      shell: bash
      run: |
        set -euo pipefail
        echo "Deleting old ccache..."
        gh cache delete ccache-${{ env.CONFIG }}-modules-${{ env.KERNEL_FULL_VER }}- || true

    - name: Upload Kernel Modules zip
      if: success() && steps.create_zip.conclusion == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: kernel-modules-${{ env.CONFIG }}
        path: ${{ env.CONFIG }}/artifacts/
